name: Update traffic incidents

"on":
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch Ontario 511 events
        run: |
          curl -L "https://511on.ca/api/v2/get/event?format=json&lang=en" -o raw-events.json

          python3 << 'PY'
          import json
          import re

          COVERAGE_KEYWORDS = [
              "london", "middlesex", "elgin", "oxford", "chatham", "chatham-kent",
              "windsor", "sarnia", "lambton", "strathroy", "st. thomas", "saint thomas",
              "woodstock", "ingersoll", "tillsonburg", "aylmer", "goderich", "exeter",
              "grand bend", "stratford", "perth", "huron", "bruce", "tobermory",
              "owen sound", "kincardine", "walkerton", "port stanley",
              "hwy 401", "highway 401", "hwy 402", "highway 402"
          ]

          EXCLUDE_KEYWORDS = [
              "nipissing", "sudbury", "thunder bay", "timmins", "ottawa",
              "kingston", "mattawa", "cartier", "toronto", "mississauga",
              "brampton", "aurora", "tay", "springwater", "oro medonte",
              "severn", "hwy 404", "hwy 11", "hwy 93"
          ]

          def normalize(text):
              return str(text or "").lower()

          def in_coverage(text):
              text = normalize(text)

              if any(word in text for word in EXCLUDE_KEYWORDS):
                  return False

              if any(word in text for word in COVERAGE_KEYWORDS):
                  return True

              if re.search(r"\b(401|402)\b", text):
                  return True

              return False

          def classify_event(text):
              t = normalize(text)

              if any(word in t for word in ["collision", "accident", "crash", "rollover"]):
                  return "Collision"

              if any(word in t for word in ["all lanes closed", "road closed", "ramp closed"]):
                  return "Closure"

              if any(word in t for word in [
                  "lane closed", "right lane closed", "left lane closed",
                  "alternating lane", "construction", "maintenance",
                  "lane restriction", "shoulder closed"
              ]):
                  return "Lane Reduction"

              if any(word in t for word in [
                  "disabled vehicle", "debris", "flooding", "object on roadway",
                  "weather hazard", "animal"
              ]):
                  return "Hazard"

              return "Hazard"

          def make_radio(event_type, road):
              if event_type == "Collision":
                  return f"A collision on {road}."
              if event_type == "Closure":
                  return f"A closure on {road}."
              if event_type == "Lane Reduction":
                  return f"A lane reduction on {road}."
              return f"A traffic hazard on {road}."

          with open("raw-events.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          output = []

          for event in data:
              road = event.get("RoadwayName") or "Unknown road"

              direction = event.get("DirectionOfTravel")
              if direction:
                  road = f"{road} {direction}"

              description = event.get("Description") or event.get("Comment") or "Incident reported."
              location_text = f"{road} {description}"

              if not in_coverage(location_text):
                  continue

              event_type = classify_event(location_text)

              output.append({
                  "type": event_type,
                  "road": road,
                  "minutesAgo": 0,
                  "note": description,
                  "source": "511",
                  "major": event_type == "Closure",
                  "radio": make_radio(event_type, road)
              })

          with open("incidents.json", "w", encoding="utf-8") as f:
              json.dump(output, f, indent=2)
          PY

      - name: Commit updated incidents
        run: |
          git config user.name "traffic-watcher-bot"
          git config user.email "actions@github.com"

          git reset --hard
          git pull

          git add incidents.json
          git commit -m "Update incidents" || echo "No changes"

          git push
