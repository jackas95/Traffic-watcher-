<!DOCTYPE html>
<html>
<head>
  <title>Traffic Watcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .sub {
      color: #ccc;
      margin-top: 6px;
      font-size: 16px;
    }

    .topbar {
      background: white;
      padding: 14px 18px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 5px #ccc;
    }

    .updated {
      color: #555;
      font-size: 15px;
    }

    .new-banner {
      margin-top: 8px;
      background: #b00020;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      display: none;
    }

    .incident {
      background: white;
      margin: 14px;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 1px 6px #ccc;
      border-left: 7px solid transparent;
      transition: 0.3s;
    }

    .major {
      border-left-color: #b00020;
    }

    .fresh {
      animation: glow 1.2s ease-in-out 2;
    }

    @keyframes glow {
      0% { background: #fff5f5; }
      50% { background: #ffe3e3; }
      100% { background: white; }
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .type {
      font-size: 26px;
      font-weight: bold;
    }

    .badge {
      background: #b00020;
      color: white;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .source {
      background: #ddd;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .time {
      margin-top: 8px;
      color: #666;
      font-size: 14px;
    }

    .road {
      margin-top: 12px;
      font-size: 30px;
      font-weight: bold;
    }

    .note {
      margin-top: 10px;
      font-size: 18px;
      color: #444;
      line-height: 1.4;
    }

    .radio {
      margin-top: 14px;
      background: #f1f1f1;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.4;
    }

    a {
      display: inline-block;
      margin-top: 14px;
      color: #0066cc;
      font-size: 17px;
    }

  </style>
</head>

<body>

<header>
  <h1>Traffic Watcher</h1>
  <div class="sub">London / Southwestern Ontario live incident feed</div>
</header>

<div class="topbar">
  <div class="updated" id="updated"></div>
  <div class="new-banner" id="banner"></div>
</div>

<div id="feed"></div>

<script>

let incidents = [
  {
    type: "Collision",
    road: "401 EB near Highbury Ave",
    minutesAgo: 3,
    note: "Traffic backing up approaching London.",
    source: "Waze",
    major: true
  },

  {
    type: "Hazard",
    road: "Wellington Rd near Commissioners",
    minutesAgo: 9,
    note: "Debris reported in center lane.",
    source: "Waze",
    major: false
  },

  {
    type: "Closure",
    road: "Richmond St near Oxford",
    minutesAgo: 24,
    note: "Lane blocked due to emergency crews.",
    source: "511",
    major: false
  }
];

function updateTime() {
  const now = new Date();

  document.getElementById("updated").innerText =
    "Last updated: " + now.toLocaleTimeString();
}

function renderFeed() {

  incidents.sort((a, b) => a.minutesAgo - b.minutesAgo);

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  const newCount = incidents.filter(i => i.minutesAgo <= 10).length;

  const banner = document.getElementById("banner");

  if (newCount > 0) {
    banner.style.display = "block";
    banner.innerText = newCount + " new incident" + (newCount > 1 ? "s" : "");
  } else {
    banner.style.display = "none";
  }

  incidents.forEach(item => {

    const isNew = item.minutesAgo <= 10;

    const radioLine =
      `${item.type} reported on ${item.road}. ${item.note}`;

    feed.innerHTML += `
      <div class="incident ${item.major ? "major" : ""} ${isNew ? "fresh" : ""}">

        <div class="header-row">
          <div class="type">${item.type}</div>

          ${isNew ? '<div class="badge">NEW</div>' : ''}

          <div class="source">${item.source}</div>
        </div>

        <div class="time">
          Reported ${item.minutesAgo} minutes ago
        </div>

        <div class="road">
          ${item.road}
        </div>

        <div class="note">
          ${item.note}
        </div>

        <div class="radio">
          <strong>Radio line:</strong><br>
          ${radioLine}
        </div>

      </div>
    `;
  });

}

updateTime();
renderFeed();

setInterval(() => {
  updateTime();
}, 1000);

</script>

</body>
</html>
