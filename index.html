<!DOCTYPE html>
<html>
<head>
  <title>Traffic Watcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #111;
      color: white;
      padding: 14px 16px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .sub {
      color: #ccc;
      margin-top: 4px;
      font-size: 14px;
    }

    .topbar {
      background: white;
      padding: 10px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 5px #ccc;
    }

    .updated {
      color: #555;
      font-size: 13px;
      margin-bottom: 8px;
    }

    button {
      padding: 7px 10px;
      margin: 2px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      font-size: 13px;
    }

    button.active {
      background: #111;
      color: white;
      border-color: #111;
    }

    .incident {
      background: white;
      margin: 8px 10px;
      padding: 11px 13px;
      border-radius: 12px;
      box-shadow: 0 1px 4px #ccc;
      border-left: 5px solid transparent;
    }

    .major {
      border-left-color: #b00020;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .type {
      font-size: 18px;
      font-weight: bold;
    }

    .badge {
      background: #b00020;
      color: white;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
    }

    .source {
      background: #ddd;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
    }

    .time {
      margin-top: 5px;
      color: #666;
      font-size: 12px;
    }

    .road {
      margin-top: 7px;
      font-size: 20px;
      font-weight: bold;
    }

    .note {
      margin-top: 5px;
      font-size: 14px;
      color: #444;
      line-height: 1.35;
    }

    .radio {
      margin-top: 8px;
      background: #f1f1f1;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.35;
    }
  </style>
</head>

<body>

<header>
  <h1>Traffic Watcher</h1>
  <div class="sub">London / Southwestern Ontario incident feed</div>
</header>

<div class="topbar">
  <div class="updated" id="updated"></div>

  <button id="btn-Collision" class="active" onclick="setFilter('Collision')">Collisions</button>
  <button id="btn-Hazard" onclick="setFilter('Hazard')">Hazards</button>
  <button id="btn-Closure" onclick="setFilter('Closure')">Closures</button>
  <button id="btn-All" onclick="setFilter('All')">All</button>
</div>

<div id="feed"></div>

<script>
let currentFilter = "Collision";
let incidents = [];

async function loadIncidents() {
  // Later, this is where live Waze/511 data will be loaded.
  // For now, we use sample data in the same shape real data will use.

  incidents = [
    {
      type: "Collision",
      road: "401 EB near Highbury Ave",
      minutesAgo: 3,
      note: "Traffic backing up approaching London.",
      source: "Waze",
      major: true,
      radio: "A collision on 401 eastbound near Highbury Avenue."
    },
    {
      type: "Hazard",
      road: "Wellington Rd near Commissioners",
      minutesAgo: 9,
      note: "Debris reported in centre lane.",
      source: "Waze",
      major: false,
      radio: "A hazard on Wellington Road near Commissioners Road."
    },
    {
      type: "Closure",
      road: "Richmond St near Oxford",
      minutesAgo: 24,
      note: "Lane blocked due to emergency crews.",
      source: "511",
      major: false,
      radio: "A closure on Richmond Street near Oxford Street."
    },
    {
      type: "Collision",
      road: "Wonderland Rd at Southdale Rd",
      minutesAgo: 11,
      note: "Delays building through the intersection.",
      source: "Waze",
      major: false,
      radio: "A collision at Wonderland Road and Southdale Road."
    },
    {
      type: "Collision",
      road: "Oxford St W near Hyde Park Rd",
      minutesAgo: 18,
      note: "Slow traffic in the area.",
      source: "Waze",
      major: false,
      radio: "A collision on Oxford Street West near Hyde Park Road."
    }
  ];

  updateTime();
  renderFeed();
}

function updateTime() {
  const now = new Date();
  document.getElementById("updated").innerText =
    "Last updated: " + now.toLocaleTimeString();
}

function setFilter(type) {
  currentFilter = type;

  ["Collision", "Hazard", "Closure", "All"].forEach(t => {
    document.getElementById("btn-" + t).classList.remove("active");
  });

  document.getElementById("btn-" + type).classList.add("active");

  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  let shown = [...incidents];

  if (currentFilter !== "All") {
    shown = shown.filter(i => i.type === currentFilter);
  }

  shown.sort((a, b) => a.minutesAgo - b.minutesAgo);

  shown.forEach(item => {
    const isNew = item.minutesAgo <= 10;

    feed.innerHTML += `
      <div class="incident ${item.major ? "major" : ""}">
        <div class="header-row">
          <div class="type">${item.type}</div>
          ${isNew ? '<div class="badge">NEW</div>' : ''}
          <div class="source">${item.source}</div>
        </div>

        <div class="time">Reported ${item.minutesAgo} minutes ago</div>
        <div class="road">${item.road}</div>
        <div class="note">${item.note}</div>
        <div class="radio"><strong>Radio:</strong> ${item.radio}</div>
      </div>
    `;
  });
}

loadIncidents();

setInterval(() => {
  loadIncidents();
}, 60000);
</script>

</body>
</html>
